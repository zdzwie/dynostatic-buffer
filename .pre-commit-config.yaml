exclude: '^(tests/googletest/|cmake-build-.*/|build/)'

repos:
  # Generic, language-agnostic file hygiene checks.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-json
      - id: check-yaml

  # Code formatting with clang-format 18 (pinned via the mirror rev below).
  # The hook ships its own clang-format binary, so no system install is needed.
  # -style=file forces use of the repo-root .clang-format; -fallback-style=none
  # ensures clang-format NEVER falls back to a built-in style if that file is
  # missing (it skips instead), so formatting only ever follows .clang-format.
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c, c++]
        args: [-style=file, --fallback-style=none]

  # Project-specific static analysis.
  - repo: local
    hooks:
      - id: cppcheck
        name: cppcheck static analysis
        language: system
        entry: cppcheck --quiet --error-exitcode=1
          --enable=warning,style,performance,portability
          --inline-suppr -I library
        files: '\.(c|h|cpp|hpp)$'
        pass_filenames: true
