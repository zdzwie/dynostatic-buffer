exclude: '^(tests/googletest/|cmake-build-.*/|build/)'

repos:
  # Generic, language-agnostic file hygiene checks.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-json
      - id: check-yaml

  # Code formatting with clang-format 18 (pinned via the mirror rev below).
  # The hook ships its own clang-format binary, so no system install is needed.
  #
  # Run in check/report mode rather than auto-fix:
  #   --dry-run --Werror  report each violation as "file:line: error ..." and
  #                       exit non-zero, so pre-commit prints WHAT is wrong
  #                       instead of the mirror's silent "-i" rewrite (which
  #                       only yields a generic "files were modified" message).
  #                       --dry-run also overrides the mirror's default -i, so
  #                       no files are edited in place.
  #   -style=file:clang-format  load the style from the repo-root `clang-format`
  #                       file (it lacks the leading dot, so it is not
  #                       auto-discovered and must be given explicitly).
  #   --fallback-style=none     never fall back to a built-in style.
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c, c++]
        args: [--dry-run, --Werror, -style=file:clang-format, --fallback-style=none]

  # Project-specific static analysis.
  - repo: local
    hooks:
      - id: cppcheck
        name: cppcheck static analysis
        language: system
        entry: cppcheck --quiet --error-exitcode=1
          --enable=warning,style,performance,portability
          --inline-suppr -I library
        files: '\.(c|h|cpp|hpp)$'
        pass_filenames: true
