# Read the Docs build configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  # Doxygen is invoked from docs/conf.py to produce the XML that Breathe reads.
  apt_packages:
    - doxygen

sphinx:
  configuration: docs/conf.py

python:
  install:
    - requirements: docs/requirements.txt
